<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Catch The Fruits Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ─── Telemetry ─── -->
    <header class="dash">
      <div class="metric">
        <span class="m-label">Score</span>
        <span class="m-value" id="score">0</span>
      </div>
      <div class="metric">
        <span class="m-label">Combo</span>
        <span class="m-value accent" id="combo">×1</span>
      </div>
      <div class="metric">
        <span class="m-label">Lives</span>
        <span class="m-value" id="lives">3</span>
      </div>
      <div class="metric">
        <span class="m-label">Best</span>
        <span class="m-value" id="best">0</span>
      </div>
    </header>

    <!-- ─── Canvas ─── -->
    <div class="canvas-wrap">
      <canvas id="game" width="480" height="640"></canvas>
      <!-- floating score texts rendered over canvas via DOM -->
    </div>

    <!-- ─── Game Over ─── -->
    <div class="modal" id="modal">
      <div class="modal-card">
        <h2 class="modal-title">GAME OVER</h2>
        <div class="modal-stats">
          <div class="m-row"><span>Score</span><span id="m-score">0</span></div>
          <div class="m-row"><span>Best</span><span id="m-best">0</span></div>
        </div>
        <button class="btn-restart" id="btn-restart">⟳ Play Again</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
