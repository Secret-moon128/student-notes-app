<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="calculator" aria-label="Calculator">
      <div class="calculator__header">
        <p class="eyebrow">Simple Calculator</p>
        <h1>Calculate instantly</h1>
        <p class="subtitle">Use the buttons or your keyboard.</p>
      </div>

      <div class="display" aria-live="polite">
        <div class="display__history" id="history">&nbsp;</div>
        <div class="display__value" id="display">0</div>
      </div>

      <div class="keys" role="group" aria-label="Calculator buttons">
        <button class="key key--ghost" data-action="clear">C</button>
        <button class="key key--ghost" data-action="delete">DEL</button>
        <button class="key key--accent" data-value="%">%</button>
        <button class="key key--accent" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key--accent" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key--accent" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key--accent" data-value="+">+</button>

        <button class="key key--wide" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key key--equal" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
