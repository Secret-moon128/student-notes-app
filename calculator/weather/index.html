<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather — Student Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Weather</h1>
    <form id="searchForm">
      <input id="cityInput" type="text" placeholder="Enter city (e.g. London)" required />
      <button type="submit">Get Weather</button>
    </form>

    <section id="result" class="card hidden">
      <h2 id="location"></h2>
      <p id="summary"></p>
      <ul id="details"></ul>
    </section>

    <p id="error" class="error hidden"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
