<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Collector — Arcade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span id="scoreDisplay" class="hud-value">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Lives</span>
        <div id="livesDisplay" class="hud-lives"></div>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Best</span>
        <span id="bestDisplay" class="hud-value">0</span>
      </div>
    </header>

    <div id="canvasWrapper">
      <canvas id="gameCanvas" width="600" height="800"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="overlay-box">
          <h1>CANDY COLLECTOR</h1>
          <p class="sub">Catch candies &bull; Avoid bombs!</p>
          <div class="hint">
            Move basket with <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or mouse
          </div>
          <button id="startBtn" class="btn">START GAME</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>GAME OVER</h2>
          <div class="report">
            <div class="r-row"><span>Candies Caught</span><span id="finalScore">0</span></div>
            <div class="r-row"><span>Best Score</span><span id="finalBest">0</span></div>
          </div>
          <button id="restartBtn" class="btn">PLAY AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
