<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Archery Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="telemetry">
      <div class="stat">
        <span class="label">SCORE</span>
        <span class="value" id="scoreDisplay">0</span>
      </div>
      <div class="stat">
        <span class="label">ARROWS</span>
        <span class="value" id="arrowsDisplay">15/15</span>
      </div>
      <div class="stat">
        <span class="label">ACCURACY</span>
        <span class="value" id="accDisplay">0%</span>
      </div>
      <div class="stat">
        <span class="label">BEST</span>
        <span class="value" id="bestDisplay">0</span>
      </div>
      <div id="difficulty">
        <button class="diff-btn active" data-diff="easy">EASY</button>
        <button class="diff-btn" data-diff="medium">MED</button>
        <button class="diff-btn" data-diff="hard">HARD</button>
      </div>
    </div>
    <div id="canvasWrap">
      <canvas id="gameCanvas" width="640" height="400"></canvas>
      <div id="infoMsg" class="info-msg hidden"></div>
    </div>
  </div>
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2>ROUND COMPLETE</h2>
      <div class="modal-stats">
        <div class="modal-stat">
          <span class="modal-label">SCORE</span>
          <span class="modal-val gold" id="finalScore">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-label">ACCURACY</span>
          <span class="modal-val" id="finalAcc">0%</span>
        </div>
        <div class="modal-stat">
          <span class="modal-label">HITS</span>
          <span class="modal-val" id="finalHits">0 / 0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-label">HIGH SCORE</span>
          <span class="modal-val" id="finalBest">0</span>
        </div>
      </div>
      <div class="breakdown" id="breakdown"></div>
      <button id="restartBtn">NEW ROUND</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
