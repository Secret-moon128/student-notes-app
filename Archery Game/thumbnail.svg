<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#05070c"/>
  <!-- Grid lines -->
  <g opacity="0.03">
    <line x1="0" y1="25" x2="128" y2="25" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="50" x2="128" y2="50" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="75" x2="128" y2="75" stroke="#fff" stroke-width="0.3"/>
    <line x1="0" y1="100" x2="128" y2="100" stroke="#fff" stroke-width="0.3"/>
    <line x1="25" y1="0" x2="25" y2="128" stroke="#fff" stroke-width="0.3"/>
    <line x1="50" y1="0" x2="50" y2="128" stroke="#fff" stroke-width="0.3"/>
    <line x1="75" y1="0" x2="75" y2="128" stroke="#fff" stroke-width="0.3"/>
    <line x1="100" y1="0" x2="100" y2="128" stroke="#fff" stroke-width="0.3"/>
  </g>
  <!-- Bow on left -->
  <g transform="translate(18,64)">
    <path d="M0,-16 Q-10,0 0,16" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="rgba(226,232,240,0.2)" stroke-width="0.6"/>
  </g>
  <!-- Arrow mid-flight -->
  <g transform="translate(56,48) rotate(-8)">
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="-12" y1="0" x2="-9" y2="-3" stroke="#ef4444" stroke-width="0.6"/>
    <line x1="-12" y1="0" x2="-9" y2="3" stroke="#ef4444" stroke-width="0.6"/>
    <polygon points="12,0 8,-2 8,2" fill="#e2e8f0"/>
  </g>
  <!-- Arrow trail -->
  <g opacity="0.2">
    <circle cx="50" cy="46" r="1" fill="#ffd700"/>
    <circle cx="44" cy="44" r="0.8" fill="#ffd700"/>
    <circle cx="38" cy="43" r="0.6" fill="#ffd700"/>
  </g>
  <!-- Target on right -->
  <g transform="translate(108,56)">
    <circle cx="0" cy="0" r="16" fill="#1e3a5f" stroke="rgba(59,130,246,0.3)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#5f1e1e" stroke="rgba(239,68,68,0.3)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#8b6914"/>
    <circle cx="0" cy="0" r="3" fill="#ffd700"/>
  </g>
  <!-- Telemetry bar -->
  <rect x="4" y="4" width="120" height="14" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(0,255,200,0.1)" stroke-width="0.5"/>
  <text x="8" y="13" font-size="4" fill="#475569" font-family="monospace" letter-spacing="1">SCORE</text>
  <text x="7" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">200</text>
  <text x="30" y="13" font-size="4" fill="#475569" font-family="monospace" letter-spacing="1">ARROWS</text>
  <text x="30" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">12/15</text>
  <text x="58" y="13" font-size="4" fill="#475569" font-family="monospace" letter-spacing="1">ACC</text>
  <text x="58" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">67%</text>
  <!-- Wind indicator -->
  <g transform="translate(110,24)">
    <text x="0" y="-2" font-size="2.5" fill="#475569" text-anchor="middle" font-family="monospace">WIND</text>
    <line x1="0" y1="4" x2="6" y2="4" stroke="#00ffc8" stroke-width="0.8"/>
    <polygon points="6,2 8,4 6,6" fill="#00ffc8"/>
    <text x="0" y="12" font-size="2.5" fill="#00ffc8" text-anchor="middle" font-family="monospace">0.32</text>
  </g>
  <!-- Ground -->
  <rect x="0" y="120" width="128" height="8" fill="#080b14"/>
  <line x1="0" y1="120" x2="128" y2="120" stroke="rgba(0,255,200,0.06)" stroke-width="0.5"/>
</svg>
