<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Reconstruction — Neural Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg: #0a0a0a;
            --pixel-green: #39ff14;
            --pixel-pink: #ff00ff;
            --pixel-blue: #00ffff;
            --surface: #1a1a1a;
            --border: #333;
            --text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .pixel-container {
            width: 95%;
            max-width: 600px;
            background: var(--surface);
            border: 6px solid var(--pixel-blue);
            padding: 20px;
            box-shadow: 10px 10px 0 var(--pixel-pink);
            text-align: center;
            position: relative;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            color: var(--pixel-green);
            margin: 0 0 20px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: var(--pixel-blue);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Target Grid */
        .target-grid {
            display: grid;
            background: #000;
            border: 4px solid var(--border);
            position: relative;
        }

        .slot {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        .slot.drag-over {
            background: rgba(0, 255, 255, 0.1);
            border: 1px dashed var(--pixel-blue);
        }

        /* Tray for scrambled pixels */
        .pixel-tray {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            background: #000;
            padding: 15px;
            border: 2px solid var(--border);
            min-height: 80px;
            width: 100%;
            box-sizing: border-box;
        }

        .pixel-block {
            width: 60px;
            height: 60px;
            cursor: grab;
            background-size: 300px 300px; /* Base image size */
            border: 1px solid #000;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        .pixel-block:active { cursor: grabbing; }
        .pixel-block.dragging { opacity: 0.5; }
        .pixel-block.placed { cursor: default; }

        /* UI Components */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-pixel {
            background: var(--pixel-green);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #1b8a00;
            transition: 0.1s;
            margin-top: 20px;
        }

        .btn-pixel:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #1b8a00;
        }

        .hidden { display: none !important; }

        .preview-small {
            width: 80px;
            height: 80px;
            border: 2px solid var(--border);
            background-size: cover;
            margin-bottom: 10px;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <div class="pixel-container">
        <div id="start-overlay" class="overlay">
            <h1>Pixel Reconstruct</h1>
            <p style="font-size: 1.2rem; margin: 10px 0 30px;">Restore the corrupted image blocks to their correct sequence.</p>
            <button class="btn-pixel" onclick="startGame()">Initialize</button>
        </div>

        <div id="win-overlay" class="overlay hidden">
            <h1 style="color: var(--pixel-blue);">DATA RESTORED</h1>
            <p id="win-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
            <button class="btn-pixel" onclick="nextLevel()">Next Protocol</button>
        </div>

        <div class="stats">
            <span>LEVEL: <span id="level-val">1</span></span>
            <span>ACCURACY: <span id="accuracy-val">100%</span></span>
            <span>SCORE: <span id="score-val">0</span></span>
        </div>

        <div class="game-layout">
            <div class="target-grid" id="board"></div>
            
            <div style="font-size: 1.2rem; color: var(--pixel-pink);">SOURCE BUFFER</div>
            <div class="pixel-tray" id="tray"></div>

            <div style="margin-top: 10px;">
                <div class="preview-small" id="preview-img"></div>
                <div style="font-size: 1rem; opacity: 0.6;">REFERENCE DATA</div>
            </div>
        </div>
    </div>

    <script>
        const IMAGES = [
            'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=300&q=80',
            'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=300&q=80',
            'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=300&q=80'
        ];

        let state = {
            level: 1,
            score: 0,
            gridSize: 3, // Start with 3x3
            placedCount: 0,
            errors: 0,
            imageUrl: ''
        };

        function startGame() {
            state.score = 0;
            state.level = 1;
            document.getElementById('start-overlay').classList.add('hidden');
            initLevel();
        }

        function initLevel() {
            state.gridSize = 2 + state.level; // Scaling difficulty
            state.placedCount = 0;
            state.errors = 0;
            state.imageUrl = IMAGES[(state.level - 1) % IMAGES.length];
            
            document.getElementById('level-val').innerText = state.level;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('accuracy-val').innerText = '100%';
            document.getElementById('win-overlay').classList.add('hidden');
            document.getElementById('preview-img').style.backgroundImage = `url(${state.imageUrl})`;

            renderBoard();
            renderTray();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.style.gridTemplateColumns = `repeat(${state.gridSize}, 1fr)`;
            board.innerHTML = '';

            const totalTiles = state.gridSize * state.gridSize;
            const tileSize = 300 / state.gridSize;

            for (let i = 0; i < totalTiles; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.width = `${60 * (3 / state.gridSize) * 1.5}px`;
                slot.style.height = `${60 * (3 / state.gridSize) * 1.5}px`;
                slot.dataset.index = i;
                
                slot.ondragover = e => { e.preventDefault(); slot.classList.add('drag-over'); };
                slot.ondragleave = () => slot.classList.remove('drag-over');
                slot.ondrop = handleDrop;
                
                board.appendChild(slot);
            }
        }

        function renderTray() {
            const tray = document.getElementById('tray');
            tray.innerHTML = '';
            const totalTiles = state.gridSize * state.gridSize;
            const tileSize = 300 / state.gridSize;
            const pixelSize = 60 * (3 / state.gridSize) * 1.5;

            let blocks = [];
            for (let i = 0; i < totalTiles; i++) {
                const block = document.createElement('div');
                block.className = 'pixel-block';
                block.draggable = true;
                block.id = `block-${i}`;
                block.dataset.index = i;
                
                block.style.width = `${pixelSize}px`;
                block.style.height = `${pixelSize}px`;
                block.style.backgroundImage = `url(${state.imageUrl})`;
                block.style.backgroundSize = `300px 300px`;
                
                const r = Math.floor(i / state.gridSize);
                const c = i % state.gridSize;
                block.style.backgroundPosition = `-${c * tileSize}px -${r * tileSize}px`;
                
                block.ondragstart = e => {
                    e.dataTransfer.setData('text', block.id);
                    block.classList.add('dragging');
                };
                block.ondragend = () => block.classList.remove('dragging');
                
                blocks.push(block);
            }

            // Shuffle and add to tray
            blocks.sort(() => Math.random() - 0.5).forEach(b => tray.appendChild(b));
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.currentTarget;
            slot.classList.remove('drag-over');
            
            const blockId = e.dataTransfer.getData('text');
            const block = document.getElementById(blockId);
            
            if (slot.children.length > 0) return;

            if (block.dataset.index === slot.dataset.index) {
                // Correct Placement
                slot.appendChild(block);
                block.draggable = false;
                block.classList.add('placed');
                state.placedCount++;
                state.score += 100;
                
                if (state.placedCount === state.gridSize * state.gridSize) {
                    setTimeout(showWin, 500);
                }
            } else {
                // Incorrect Placement
                state.errors++;
                state.score = Math.max(0, state.score - 20);
                const acc = Math.max(0, 100 - (state.errors * 5));
                document.getElementById('accuracy-val').innerText = `${acc}%`;
            }
            document.getElementById('score-val').innerText = state.score;
        }

        function showWin() {
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('win-stats').innerText = `Final Score: ${state.score} | Errors: ${state.errors}`;
        }

        function nextLevel() {
            state.level++;
            initLevel();
        }
    </script>
</body>
</html>
