<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Header ─── -->
  <header class="header">
    <h1 class="logo">⚛ QUANTUM TIC–TAC–TOE</h1>
    <p class="rules">Each player can only keep <strong>3 tokens</strong> on the board. Placing a 4th removes the oldest one.</p>
  </header>

  <!-- ─── Turn Indicator ─── -->
  <div class="turn-banner" id="turn-banner">
    <span class="turn-label">Turn</span>
    <span class="turn-token" id="turn-token">X</span>
  </div>

  <!-- ─── Board ─── -->
  <main class="board-wrap">
    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>
  </main>

  <!-- ─── Status & Reset ─── -->
  <div class="status-bar" id="status-bar">Place your first token</div>

  <button class="btn-reset" id="btn-reset">⟳ New Game</button>

  <script src="script.js"></script>
</body>
</html>
