<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CGPA Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --bg: #080c14;
      --surface: #0f1724;
      --surface2: #162033;
      --border: #1c2d4a;
      --accent: #00e5a0;
      --accent2: #4d9fff;
      --danger: #ff6b6b;
      --warn: #ffb347;
      --text: #e2eaff;
      --muted: #5a7099;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }

    .glow { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; opacity: 0.1; }
    .glow-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
    .glow-2 { width: 400px; height: 400px; background: var(--accent2); bottom: 0; right: -100px; }

    #root { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; }
    .nav-back { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--accent); }
    .nav-title { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }

    /* HEADER */
    .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.6s ease both; }
    .header h1 { font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.6rem; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .card-label { font-family: var(--mono); font-size: 0.62rem; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 1.2rem; }

    /* SETUP ROW */
    .setup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.45rem; }
    .field label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; }
    .field input, .field select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.65rem 0.9rem; color: var(--text); font-family: var(--mono); font-size: 0.9rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    /* SUBJECTS */
    .col-headers { display: grid; grid-template-columns: 1fr 72px 90px 34px; gap: 0.5rem; margin-bottom: 0.4rem; }
    .col-headers span { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .col-headers span:nth-child(2), .col-headers span:nth-child(3) { text-align: center; }

    .subject-row { display: grid; grid-template-columns: 1fr 72px 90px 34px; gap: 0.5rem; align-items: center; margin-bottom: 0.55rem; animation: fadeUp 0.25s ease both; }
    .subject-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.7rem; color: var(--text); font-family: var(--mono); font-size: 0.82rem; outline: none; transition: border-color 0.2s; width: 100%; text-align: center; }
    .subject-row input:first-child { text-align: left; }
    .subject-row input:focus { border-color: var(--accent); }
    .subject-row input.pending { border-color: rgba(255,179,71,0.4); color: var(--warn); }

    .btn-remove { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: var(--danger); border-radius: 8px; cursor: pointer; font-size: 1rem; height: 34px; width: 34px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
    .btn-remove:hover { background: rgba(255,107,107,0.2); }

    .btn-add { background: transparent; border: 1px dashed var(--border); color: var(--muted); border-radius: 10px; padding: 0.65rem; font-family: var(--mono); font-size: 0.78rem; cursor: pointer; width: 100%; transition: all 0.2s; margin-top: 0.4rem; }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.04); }

    /* CALCULATE BTN */
    .btn-calc { width: 100%; background: var(--accent); color: #080c14; border: none; border-radius: 12px; padding: 1rem; font-family: var(--sans); font-size: 1.05rem; font-weight: 800; cursor: pointer; margin-bottom: 1.2rem; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 0 30px rgba(0,229,160,0.2); }
    .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 0 45px rgba(0,229,160,0.35); }
    .btn-calc:active { transform: translateY(0); }

    /* RESULT */
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.8rem; animation: fadeUp 0.4s ease both; }
    .result-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .result-icon { font-size: 2.4rem; line-height: 1; }
    .result-title { font-size: 1.2rem; font-weight: 800; }
    .result-sub { font-family: var(--mono); font-size: 0.67rem; color: var(--muted); margin-top: 0.2rem; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1.2rem; }
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-box.hl { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.05); }
    .stat-val { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .stat-box.hl .stat-val { color: var(--accent); }
    .stat-label { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.3rem; }

    /* PROGRESS BAR */
    .progress-wrap { margin-bottom: 1.2rem; }
    .progress-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem; }
    .progress-track { background: var(--surface2); border-radius: 999px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.34,1.2,0.64,1); }

    /* ADVICE */
    .advice { border-radius: 10px; padding: 1rem 1.2rem; font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.2rem; }
    .advice.ok   { background: rgba(0,229,160,0.07); border: 1px solid rgba(0,229,160,0.2); color: #a0f0d0; }
    .advice.warn { background: rgba(255,179,71,0.07); border: 1px solid rgba(255,179,71,0.2); color: #ffe0a0; }
    .advice.bad  { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.2); color: #ffb0b0; }

    /* PENDING LIST */
    .pending-title { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
    .pending-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 1rem; margin-bottom: 0.45rem; }
    .pending-name { font-size: 0.88rem; font-weight: 600; }
    .pending-credits { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
    .pending-need { font-family: var(--mono); font-size: 0.95rem; font-weight: 700; color: var(--accent); }
    .pending-need.hard { color: var(--danger); }
    .pending-need.any  { color: var(--muted); }

    /* RESET */
    .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.6rem 1.2rem; font-family: var(--mono); font-size: 0.72rem; cursor: pointer; margin-top: 1rem; transition: all 0.2s; width: 100%; }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    /* ANIMATIONS */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:translateY(0); } }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .setup-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-box:last-child { grid-column: 1/-1; }
      .col-headers { grid-template-columns: 1fr 62px 78px 30px; }
      .subject-row { grid-template-columns: 1fr 62px 78px 30px; }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    let uid = 0;
    const newSubject = () => ({ id: ++uid, name: '', credits: 4, grade: '' });

    function App() {
      const [scale,    setScale]    = useState(10);
      const [target,   setTarget]   = useState('');
      const [subjects, setSubjects] = useState([newSubject(), newSubject(), newSubject()]);
      const [result,   setResult]   = useState(null);

      const addSubject = () => setSubjects(s => [...s, newSubject()]);

      const removeSubject = (id) => {
        setSubjects(s => s.length > 1 ? s.filter(x => x.id !== id) : s);
      };

      const updateSubject = (id, field, value) => {
        setSubjects(s => s.map(x => x.id === id ? { ...x, [field]: value } : x));
        setResult(null);
      };

      const calculate = () => {
        const t = parseFloat(target);
        if (!t || t <= 0 || t > scale) {
          alert(`Enter a valid target between 0 and ${scale}.`);
          return;
        }

        let earnedPoints = 0, earnedCredits = 0, pending = [];

        subjects.forEach(s => {
          const credits = parseFloat(s.credits) || 0;
          const grade   = parseFloat(s.grade);
          const name    = s.name.trim() || `Subject ${s.id}`;
          if (credits <= 0) return;
          if (s.grade !== '' && !isNaN(grade) && grade > 0) {
            earnedPoints  += grade * credits;
            earnedCredits += credits;
          } else {
            pending.push({ name, credits });
          }
        });

        const totalCredits  = earnedCredits + pending.reduce((a, p) => a + p.credits, 0);
        const currentCGPA   = earnedCredits > 0 ? earnedPoints / earnedCredits : 0;
        const pendingCreds  = pending.reduce((a, p) => a + p.credits, 0);
        const stillNeeded   = t * totalCredits - earnedPoints;
        const avgNeeded     = pendingCreds > 0 ? stillNeeded / pendingCreds : null;
        const progressPct   = Math.min(100, (currentCGPA / t) * 100);

        setResult({ currentCGPA, avgNeeded, pending, pendingCreds, totalCredits, earnedCredits, progressPct, scale, target: t });
      };

      const reset = () => {
        setSubjects([newSubject(), newSubject(), newSubject()]);
        setTarget('');
        setResult(null);
      };

      const getAdvice = (r) => {
        if (!r.pending.length) {
          return r.currentCGPA >= r.target
            ? { cls: 'ok',   icon: '🏆', title: 'Target achieved!',        msg: `Your CGPA is ${r.currentCGPA.toFixed(2)} — you've already hit ${r.target}. Excellent work!` }
            : { cls: 'bad',  icon: '😬', title: 'Target not reached',       msg: `Your CGPA is ${r.currentCGPA.toFixed(2)}, which is ${(r.target - r.currentCGPA).toFixed(2)} below target. No pending subjects to improve it.` };
        }
        if (r.avgNeeded > r.scale)
          return { cls: 'bad',  icon: '⚠️', title: 'Target unreachable',      msg: `You'd need ${r.avgNeeded.toFixed(2)} avg — above the max of ${r.scale}. Try lowering your target CGPA.` };
        if (r.avgNeeded > r.scale * 0.88)
          return { cls: 'warn', icon: '🔥', title: 'Tough but possible',       msg: `You need ${r.avgNeeded.toFixed(2)} avg in ${r.pending.length} remaining subject(s). Push hard — it's achievable.` };
        if (r.avgNeeded <= 0)
          return { cls: 'ok',   icon: '✅', title: 'Already on track!',        msg: `Your completed CGPA already exceeds your target. Any grade in pending subjects keeps you there.` };
        return   { cls: 'ok',   icon: '🎯', title: 'You can do this!',         msg: `You need an average of ${r.avgNeeded.toFixed(2)} in your ${r.pending.length} pending subject(s). Totally doable!` };
      };

      const progressColor = (pct) => {
        if (pct >= 100) return 'var(--accent)';
        if (pct >= 75)  return 'var(--accent2)';
        if (pct >= 50)  return 'var(--warn)';
        return 'var(--danger)';
      };

      return (
        <div>
          {/* NAV */}
          <nav className="nav">
            <a href="index.html" className="nav-back">← Back</a>
            <span className="nav-title">CGPA CALCULATOR</span>
          </nav>

          {/* HEADER */}
          <div className="header">
            <h1>Calculate Your <span>CGPA</span></h1>
            <p>Enter your subjects, credits, and grades — get your result instantly.</p>
          </div>

          {/* SETUP */}
          <div className="card">
            <div className="card-label">Setup</div>
            <div className="setup-row">
              <div className="field">
                <label>Grading Scale</label>
                <select value={scale} onChange={e => { setScale(+e.target.value); setResult(null); }}>
                  <option value={10}>10-point scale</option>
                  <option value={4}>4-point scale (GPA)</option>
                </select>
              </div>
              <div className="field">
                <label>Target CGPA</label>
                <input
                  type="number" placeholder={`e.g. ${scale === 10 ? '8.5' : '3.5'}`}
                  min="0" max={scale} step="0.01"
                  value={target}
                  onChange={e => { setTarget(e.target.value); setResult(null); }}
                />
              </div>
            </div>
          </div>

          {/* SUBJECTS */}
          <div className="card">
            <div className="card-label">Your Subjects</div>
            <div className="col-headers">
              <span>Subject Name</span>
              <span>Credits</span>
              <span>Grade (0/blank = pending)</span>
              <span></span>
            </div>
            {subjects.map(s => (
              <div className="subject-row" key={s.id}>
                <input
                  type="text" placeholder="e.g. Maths III"
                  value={s.name}
                  onChange={e => updateSubject(s.id, 'name', e.target.value)}
                />
                <input
                  type="number" min="1" max="6" step="1"
                  value={s.credits}
                  onChange={e => updateSubject(s.id, 'credits', e.target.value)}
                />
                <input
                  type="number" min="0" max={scale} step="0.01"
                  placeholder="pending"
                  value={s.grade}
                  className={s.grade === '' || s.grade === '0' ? 'pending' : ''}
                  onChange={e => updateSubject(s.id, 'grade', e.target.value)}
                />
                <button className="btn-remove" onClick={() => removeSubject(s.id)}>×</button>
              </div>
            ))}
            <button className="btn-add" onClick={addSubject}>+ Add Subject</button>
          </div>

          {/* CALCULATE */}
          <button className="btn-calc" onClick={calculate}>Calculate →</button>

          {/* RESULT */}
          {result && (() => {
            const adv = getAdvice(result);
            return (
              <div className="result-card">
                <div className="result-header">
                  <div className="result-icon">{adv.icon}</div>
                  <div>
                    <div className="result-title">{adv.title}</div>
                    <div className="result-sub">{result.earnedCredits} credits graded · {result.totalCredits} total</div>
                  </div>
                </div>

                <div className="stats-row">
                  <div className="stat-box">
                    <div className="stat-val">{result.earnedCredits > 0 ? result.currentCGPA.toFixed(2) : '—'}</div>
                    <div className="stat-label">Current CGPA</div>
                  </div>
                  <div className="stat-box hl">
                    <div className="stat-val">
                      {result.avgNeeded === null ? '—' : result.avgNeeded <= 0 ? 'Any' : result.avgNeeded > result.scale ? `>${result.scale}` : result.avgNeeded.toFixed(2)}
                    </div>
                    <div className="stat-label">Avg Needed</div>
                  </div>
                  <div className="stat-box">
                    <div className="stat-val">{result.pending.length}</div>
                    <div className="stat-label">Pending Subs</div>
                  </div>
                </div>

                {/* PROGRESS BAR */}
                <div className="progress-wrap">
                  <div className="progress-label">
                    <span>Progress to target {result.target}</span>
                    <span>{Math.round(result.progressPct)}%</span>
                  </div>
                  <div className="progress-track">
                    <div className="progress-fill" style={{ width: `${result.progressPct}%`, background: progressColor(result.progressPct) }}></div>
                  </div>
                </div>

                <div className={`advice ${adv.cls}`}>{adv.msg}</div>

                {result.pending.length > 0 && result.avgNeeded !== null && (
                  <div>
                    <div className="pending-title">Pending Subjects — Required Grade</div>
                    {result.pending.map((p, i) => {
                      const needVal = result.avgNeeded;
                      const isHard  = needVal > result.scale * 0.88;
                      const isAny   = needVal <= 0;
                      return (
                        <div className="pending-item" key={i}>
                          <div>
                            <div className="pending-name">{p.name}</div>
                            <div className="pending-credits">{p.credits} credit{p.credits !== 1 ? 's' : ''}</div>
                          </div>
                          <div className={`pending-need ${isHard ? 'hard' : isAny ? 'any' : ''}`}>
                            {needVal > result.scale ? `>${result.scale}` : isAny ? 'Any' : needVal.toFixed(2)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                <button className="btn-reset" onClick={reset}>↺ Reset Calculator</button>
              </div>
            );
          })()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
