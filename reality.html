<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Switch — Adapt or Fail</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg: #faf7f2;
            --card: #ffffff;
            --accent: #d4a373; /* Earthy Tan */
            --player: #606c38; /* Sage Green */
            --obstacle: #bc6c25; /* Terracotta */
            --text: #283618;
            --secondary: #ccd5ae;
            --danger: #e76f51;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 600px;
            text-align: center;
        }

        .game-card {
            background: var(--card);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 80px rgba(40, 54, 24, 0.08);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(204, 213, 174, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            margin-top: 0;
        }

        #game-canvas {
            background: #fdfbf9;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
            border: 3px solid var(--secondary);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
            letter-spacing: 1px;
        }

        .rule-banner {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 15px 35px rgba(40, 54, 24, 0.3);
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            opacity: 0;
            letter-spacing: 2px;
        }

        .rule-banner.show {
            opacity: 1;
            top: 150px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: var(--card);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 40px;
        }

        .btn-start {
            background: var(--player);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #283618;
            font-family: 'Outfit', sans-serif;
        }

        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #283618;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-card">
            <div id="start-overlay" class="overlay">
                <h1 style="font-size: 3rem; color: var(--accent);">Switch Reality</h1>
                <p style="margin-bottom: 40px; color: var(--text); opacity: 0.7; font-size: 1.1rem; line-height: 1.6;">
                    Reality is fragile. Adapt as the laws of physics <br>shift under your feet. Survive the storm.
                </p>
                <button class="btn-start" onclick="startGame()">Initiate Link</button>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <h1 style="color: var(--danger); font-size: 2.5rem;">Connection Terminated</h1>
                <p id="final-stats" style="margin-bottom: 40px; font-size: 1.2rem;"></p>
                <button class="btn-start" onclick="startGame()">Sync Again</button>
            </div>

            <div class="status-bar">
                <span>SURVIVAL: <span id="score-val">0</span>s</span>
                <span id="current-rule-display" style="color: var(--accent); text-transform: uppercase;">NORMAL</span>
            </div>

            <div id="rule-banner" class="rule-banner">RULE SWITCHED!</div>

            <canvas id="game-canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 450;

        const RULES = [
            { name: "NORMAL", desc: "Standard Controls" },
            { name: "INVERTED", desc: "X and Y are Swapped" },
            { name: "GRAVITY SHIFT", desc: "Upward Drift + Y Inverted" },
            { name: "MIRROR", desc: "Left and Right are Swapped" }
        ];

        let state = {
            active: false,
            score: 0,
            startTime: 0,
            player: { x: 235, y: 380, w: 30, h: 30 },
            obstacles: [],
            currentRule: 0,
            keys: {},
            lastRuleSwitch: 0,
            spawnRate: 1000,
            lastSpawn: 0
        };

        function startGame() {
            state.active = true;
            state.score = 0;
            state.startTime = 0;
            state.player = { x: 235, y: 380, w: 30, h: 30 };
            state.obstacles = [];
            state.currentRule = 0;
            state.lastRuleSwitch = 0;
            state.spawnRate = 1000;
            state.keys = {};
            
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            document.getElementById('current-rule-display').innerText = "NORMAL";
            
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => state.keys[e.key] = true);
        window.addEventListener('keyup', e => state.keys[e.key] = false);

        function showRuleBanner(name, desc) {
            const banner = document.getElementById('rule-banner');
            banner.innerText = `${name}: ${desc}`;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 2500);
            document.getElementById('current-rule-display').innerText = name;
        }

        function gameLoop(time) {
            if (!state.active) return;
            if (!state.startTime) {
                state.startTime = time;
                state.lastRuleSwitch = time;
                state.lastSpawn = time;
            }

            update(time);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update(time) {
            // Rule Switching every 7 seconds
            if (time - state.lastRuleSwitch > 7000) {
                state.currentRule = (state.currentRule + 1) % RULES.length;
                state.lastRuleSwitch = time;
                showRuleBanner(RULES[state.currentRule].name, RULES[state.currentRule].desc);
            }

            // Movement
            let speed = 6;
            let moveX = 0, moveY = 0;

            if (state.keys['ArrowLeft'] || state.keys['a']) moveX -= speed;
            if (state.keys['ArrowRight'] || state.keys['d']) moveX += speed;
            if (state.keys['ArrowUp'] || state.keys['w']) moveY -= speed;
            if (state.keys['ArrowDown'] || state.keys['s']) moveY += speed;

            // Apply Rules
            const ruleName = RULES[state.currentRule].name;
            if (ruleName === "INVERTED") {
                [moveX, moveY] = [-moveX, -moveY];
            } else if (ruleName === "GRAVITY SHIFT") {
                moveY = -moveY; // Invert Y
                moveY -= 2; // Constant drift
            } else if (ruleName === "MIRROR") {
                moveX = -moveX;
            }

            state.player.x += moveX;
            state.player.y += moveY;

            // Bounds
            state.player.x = Math.max(0, Math.min(canvas.width - state.player.w, state.player.x));
            state.player.y = Math.max(0, Math.min(canvas.height - state.player.h, state.player.y));

            // Spawning
            if (time - state.lastSpawn > state.spawnRate) {
                state.obstacles.push({
                    x: Math.random() * (canvas.width - 25),
                    y: -30,
                    w: 25,
                    h: 25,
                    speed: 3 + Math.random() * 4
                });
                state.lastSpawn = time;
                state.spawnRate = Math.max(300, 1000 - (state.score * 15));
            }

            // Collision & Cleanup
            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                let obs = state.obstacles[i];
                obs.y += obs.speed;
                
                if (
                    state.player.x < obs.x + obs.w &&
                    state.player.x + state.player.w > obs.x &&
                    state.player.y < obs.y + obs.h &&
                    state.player.y + state.player.h > obs.y
                ) {
                    gameOver();
                    return;
                }

                if (obs.y > canvas.height) state.obstacles.splice(i, 1);
            }

            state.score = Math.floor((time - state.startTime) / 1000);
            document.getElementById('score-val').innerText = state.score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player
            ctx.fillStyle = '#606c38';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(96, 108, 56, 0.4)';
            ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h);

            // Obstacles
            ctx.fillStyle = '#bc6c25';
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(188, 108, 37, 0.2)';
            state.obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });
            
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            state.active = false;
            const overlay = document.getElementById('game-over-overlay');
            document.getElementById('final-stats').innerText = `Your connection to reality lasted for ${state.score} cycles.`;
            overlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
