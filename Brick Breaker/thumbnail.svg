<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#060813"/>
  <!-- Scorebar -->
  <g transform="translate(6,5)">
    <rect x="0" y="0" width="116" height="14" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.2)" stroke-width="0.5"/>
    <text x="12" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">SCORE</text>
    <text x="10" y="11.5" font-size="6.5" fill="#e2e8f0" font-family="monospace" font-weight="700">420</text>
    <text x="46" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">BEST</text>
    <text x="44" y="11.5" font-size="6.5" fill="#00f0ff" font-family="monospace" font-weight="700">980</text>
    <text x="80" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">LIVES</text>
    <text x="80" y="11.5" font-size="6.5" fill="#e2e8f0" font-family="monospace">❤❤❤</text>
  </g>
  <!-- Canvas area -->
  <g transform="translate(6,24)">
    <rect x="0" y="0" width="116" height="84" rx="6" fill="#080c1a" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <!-- Bricks row 0-1: pink 2-hp -->
    <rect x="4" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="18" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="32" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="46" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="60" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="74" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="88" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <rect x="102" y="4" width="12" height="5" rx="2" fill="#ff2a5f"/>
    <!-- Bricks row 2-3: magenta 2-hp -->
    <rect x="4" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="18" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="32" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="46" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="60" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="74" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="88" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <rect x="102" y="11" width="12" height="5" rx="2" fill="#d946ef"/>
    <!-- Bricks row 4-5: cyan 1-hp -->
    <rect x="4" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <rect x="18" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <rect x="60" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <rect x="74" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <rect x="88" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <rect x="102" y="18" width="12" height="5" rx="2" fill="#00f0ff"/>
    <!-- Ball -->
    <circle cx="58" cy="60" r="4" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="58" cy="60" r="5" fill="none" stroke="rgba(0,240,255,0.15)" stroke-width="0.8"/>
    <!-- Paddle -->
    <rect x="38" y="68" width="40" height="6" rx="4" fill="#00f0ff"/>
  </g>
  <!-- Launch hint -->
  <text x="64" y="114" font-size="3.5" fill="#475569" text-anchor="middle" font-family="monospace">click / tap to launch</text>
</svg>
