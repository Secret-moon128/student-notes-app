<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="todo-app" aria-label="Advanced to-do app">
      <header class="hero">
        <div>
          <p class="eyebrow">Productivity hub</p>
          <h1>Advanced To-Do</h1>
          <p class="subtitle">Plan your day, focus on what matters, and keep your list organized without friction.</p>
        </div>
        <div class="stats" aria-label="Task stats">
          <div><strong id="totalTasks">0</strong><span>Total</span></div>
          <div><strong id="activeTasks">0</strong><span>Active</span></div>
          <div><strong id="doneTasks">0</strong><span>Done</span></div>
        </div>
      </header>

      <form class="composer" id="taskForm">
        <input id="taskInput" type="text" placeholder="Add a new task..." maxlength="120" autocomplete="off" />
        <input id="taskDate" type="date" />
        <select id="taskPriority" aria-label="Task priority">
          <option value="low">Low priority</option>
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
        </select>
        <button type="submit">Add Task</button>
      </form>

      <p class="composer-hint">Tip: press Enter to add a task quickly. Use priority and due date to stay on track.</p>

      <div class="toolbar">
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="Search tasks..." />
        </div>
        <div class="filter-group" role="tablist" aria-label="Task filters">
          <button class="filter-btn is-active" type="button" data-filter="all">All</button>
          <button class="filter-btn" type="button" data-filter="active">Active</button>
          <button class="filter-btn" type="button" data-filter="completed">Completed</button>
        </div>
      </div>

      <section class="list-panel">
        <div class="panel-heading">
          <h2>Tasks</h2>
          <button id="clearCompleted" type="button" class="link-button">Clear completed</button>
        </div>
        <p class="results-summary" id="resultsSummary" aria-live="polite"></p>
        <ul class="task-list" id="taskList" aria-live="polite"></ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
