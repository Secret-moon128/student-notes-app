<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Path — Photonic Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #020617;
            --surface: #0f172a;
            --accent: #00f2fe; /* Cyber Cyan */
            --accent-glow: rgba(0, 242, 254, 0.4);
            --magenta: #ff00ff;
            --text: #f1f5f9;
            --border: rgba(255, 255, 255, 0.1);
            --grid-size: 50px;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .terminal-container {
            width: 95%;
            max-width: 600px;
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 15px var(--accent-glow);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 0 0 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            opacity: 0.8;
        }

        .game-area {
            position: relative;
            background: #000;
            border: 1px solid var(--border);
            margin: 0 auto;
            cursor: crosshair;
            overflow: hidden;
        }

        #beam-canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .grid-layer {
            display: grid;
            position: relative;
            z-index: 10;
        }

        .cell {
            width: var(--grid-size);
            height: var(--grid-size);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .cell:hover { background: rgba(0, 242, 254, 0.05); }

        .mirror {
            width: 80%;
            height: 4px;
            background: var(--text);
            box-shadow: 0 0 10px white;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .source { color: var(--accent); font-size: 1.5rem; z-index: 11; }
        .target { color: var(--magenta); font-size: 1.5rem; z-index: 11; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-sci {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-sci:hover {
            background: var(--accent);
            color: var(--surface);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div id="start-overlay" class="overlay">
            <h1 style="font-size: 2.5rem;">PHOTONIC LOGIC</h1>
            <p style="color: var(--accent); margin-bottom: 30px;">Direct the laser to the collector. <br>Click cells to place mirrors, click mirrors to rotate.</p>
            <button class="btn-sci" onclick="initLevel()">Initiate Core</button>
        </div>

        <div id="win-overlay" class="overlay hidden">
            <h1 style="color: var(--accent);">SYNCHRONIZED</h1>
            <p id="level-stat" style="margin-bottom: 30px;"></p>
            <button class="btn-sci" onclick="nextLevel()">Next Protocol</button>
        </div>

        <h1>
            <span>GRID_PATH</span>
            <span id="level-val" style="font-size: 0.9rem; opacity: 0.6;">LVL_01</span>
        </h1>

        <div class="stats-row">
            <span>BEAM_STATUS: <span id="beam-status">OFFLINE</span></span>
            <span>REFLECTIONS: <span id="reflect-val">0</span></span>
        </div>

        <div class="game-area" id="game-container">
            <canvas id="beam-canvas"></canvas>
            <div id="grid" class="grid-layer"></div>
        </div>

        <div class="controls">
            <button class="btn-sci" onclick="resetLevel()">Reset</button>
            <button class="btn-sci" onclick="location.reload()">Terminal</button>
        </div>
    </div>

    <script>
        const LEVELS = [
            { size: 6, start: [0, 2], dir: [1, 0], end: [5, 5] },
            { size: 7, start: [0, 0], dir: [0, 1], end: [6, 0] },
            { size: 8, start: [3, 0], dir: [0, 1], end: [4, 7] },
            { size: 6, start: [0, 0], dir: [1, 0], end: [0, 5] }
        ];

        let state = {
            lvlIdx: 0,
            mirrors: {}, // "x,y": rotation (45 or 135)
            solved: false
        };

        function initLevel() {
            const lvl = LEVELS[state.lvlIdx];
            state.mirrors = {};
            state.solved = false;
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('win-overlay').classList.add('hidden');
            document.getElementById('level-val').innerText = `LVL_${String(state.lvlIdx + 1).padStart(2, '0')}`;
            
            renderGrid();
            updateBeam();
        }

        function renderGrid() {
            const lvl = LEVELS[state.lvlIdx];
            const grid = document.getElementById('grid');
            const container = document.getElementById('game-container');
            const pxSize = lvl.size * 50;

            container.style.width = pxSize + 'px';
            container.style.height = pxSize + 'px';
            grid.style.gridTemplateColumns = `repeat(${lvl.size}, 50px)`;
            grid.innerHTML = '';

            const canvas = document.getElementById('beam-canvas');
            canvas.width = pxSize;
            canvas.height = pxSize;

            for (let y = 0; y < lvl.size; y++) {
                for (let x = 0; x < lvl.size; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (x === lvl.start[0] && y === lvl.start[1]) cell.innerHTML = '<span class="source">⬢</span>';
                    if (x === lvl.end[0] && y === lvl.end[1]) cell.innerHTML = '<span class="target">⬥</span>';
                    
                    cell.onclick = () => handleCellClick(x, y);
                    grid.appendChild(cell);
                }
            }
        }

        function handleCellClick(x, y) {
            if (state.solved) return;
            const lvl = LEVELS[state.lvlIdx];
            if ((x === lvl.start[0] && y === lvl.start[1]) || (x === lvl.end[0] && y === lvl.end[1])) return;

            const key = `${x},${y}`;
            if (!state.mirrors[key]) {
                state.mirrors[key] = 45;
            } else if (state.mirrors[key] === 45) {
                state.mirrors[key] = 135;
            } else {
                delete state.mirrors[key];
            }
            
            updateUI();
            updateBeam();
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            const lvl = LEVELS[state.lvlIdx];
            cells.forEach((cell, i) => {
                const x = i % lvl.size;
                const y = Math.floor(i / lvl.size);
                const key = `${x},${y}`;
                
                // Clear previous mirror
                const old = cell.querySelector('.mirror');
                if (old) old.remove();

                if (state.mirrors[key]) {
                    const m = document.createElement('div');
                    m.className = 'mirror';
                    m.style.transform = `rotate(${state.mirrors[key]}deg)`;
                    cell.appendChild(m);
                }
            });
        }

        function updateBeam() {
            const lvl = LEVELS[state.lvlIdx];
            const ctx = document.getElementById('beam-canvas').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

            let curr = [lvl.start[0], lvl.start[1]];
            let dir = [lvl.dir[0], lvl.dir[1]];
            let path = [[curr[0] * 50 + 25, curr[1] * 50 + 25]];
            let reflections = 0;

            for (let i = 0; i < 100; i++) {
                curr[0] += dir[0];
                curr[1] += dir[1];

                if (curr[0] < 0 || curr[0] >= lvl.size || curr[1] < 0 || curr[1] >= lvl.size) break;

                const key = `${curr[0]},${curr[1]}`;
                path.push([curr[0] * 50 + 25, curr[1] * 50 + 25]);

                if (state.mirrors[key]) {
                    reflections++;
                    if (state.mirrors[key] === 45) { // '/' type
                        [dir[0], dir[1]] = [-dir[1], -dir[0]];
                    } else { // '\' type
                        [dir[0], dir[1]] = [dir[1], dir[0]];
                    }
                }

                if (curr[0] === lvl.end[0] && curr[1] === lvl.end[1]) {
                    state.solved = true;
                    setTimeout(winGame, 600);
                    break;
                }
            }

            // Draw beam
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#00f2fe';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2fe';
            ctx.setLineDash([5, 5]);
            
            path.forEach((pt, i) => {
                if (i === 0) ctx.moveTo(pt[0], pt[1]);
                else ctx.lineTo(pt[0], pt[1]);
            });
            ctx.stroke();
            
            document.getElementById('beam-status').innerText = state.solved ? "LOCKED" : "ACTIVE";
            document.getElementById('reflect-val').innerText = reflections;
        }

        function winGame() {
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('level-stat').innerText = `Beam synchronized with collector using ${document.getElementById('reflect-val').innerText} reflections.`;
        }

        function nextLevel() {
            state.lvlIdx = (state.lvlIdx + 1) % LEVELS.length;
            initLevel();
        }

        function resetLevel() {
            state.mirrors = {};
            state.solved = false;
            updateUI();
            updateBeam();
        }
    </script>
</body>
</html>
