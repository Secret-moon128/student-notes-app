<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Load Balancer Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div id="topPanel">
    <select id="algoSel">
      <option value="roundrobin">Round Robin</option>
      <option value="leastconn">Least Connections</option>
      <option value="weighted">Weighted Routing</option>
    </select>
    <div class="pg"><span class="pl">RATE</span><input type="range" id="rateSlider" min="1" max="20" value="6" step="1"><span id="rateVal" class="pv">6</span></div>
    <div id="telemetry">
      <div class="tm"><span class="tl">INBOUND</span><span id="inVal" class="tv">0</span></div>
      <div class="tm"><span class="tl">DROPS</span><span id="dropVal" class="tv">0%</span></div>
      <div class="tm"><span class="tl">PEAK</span><span id="peakVal" class="tv">0</span></div>
      <div class="tm"><span class="tl">EFF</span><span id="effVal" class="tv">100%</span></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvasWrap"><canvas id="lbCanvas"></canvas></div>

  <!-- Server controls -->
  <div id="serverRow">
    <div class="svCard" data-idx="0">
      <div class="svHead">SERVER A</div>
      <div class="svStat"><span class="svLab">CONN</span><span class="svConn">0</span></div>
      <div class="svStat"><span class="svLab">WGT</span><input type="range" class="wgtSlider" min="1" max="5" value="3" step="1"><span class="wgtVal">3</span></div>
      <div class="svStat"><span class="svLab">STATE</span><span class="svState healthy">HEALTHY</span></div>
      <div class="svBtns">
        <button class="crashBtn">CRASH</button>
        <button class="throttleBtn">SLOW</button>
        <button class="healBtn">HEAL</button>
      </div>
    </div>
    <div class="svCard" data-idx="1">
      <div class="svHead">SERVER B</div>
      <div class="svStat"><span class="svLab">CONN</span><span class="svConn">0</span></div>
      <div class="svStat"><span class="svLab">WGT</span><input type="range" class="wgtSlider" min="1" max="5" value="2" step="1"><span class="wgtVal">2</span></div>
      <div class="svStat"><span class="svLab">STATE</span><span class="svState healthy">HEALTHY</span></div>
      <div class="svBtns">
        <button class="crashBtn">CRASH</button>
        <button class="throttleBtn">SLOW</button>
        <button class="healBtn">HEAL</button>
      </div>
    </div>
    <div class="svCard" data-idx="2">
      <div class="svHead">SERVER C</div>
      <div class="svStat"><span class="svLab">CONN</span><span class="svConn">0</span></div>
      <div class="svStat"><span class="svLab">WGT</span><input type="range" class="wgtSlider" min="1" max="5" value="4" step="1"><span class="wgtVal">4</span></div>
      <div class="svStat"><span class="svLab">STATE</span><span class="svState healthy">HEALTHY</span></div>
      <div class="svBtns">
        <button class="crashBtn">CRASH</button>
        <button class="throttleBtn">SLOW</button>
        <button class="healBtn">HEAL</button>
      </div>
    </div>
    <div class="svCard" data-idx="3">
      <div class="svHead">SERVER D</div>
      <div class="svStat"><span class="svLab">CONN</span><span class="svConn">0</span></div>
      <div class="svStat"><span class="svLab">WGT</span><input type="range" class="wgtSlider" min="1" max="5" value="1" step="1"><span class="wgtVal">1</span></div>
      <div class="svStat"><span class="svLab">STATE</span><span class="svState healthy">HEALTHY</span></div>
      <div class="svBtns">
        <button class="crashBtn">CRASH</button>
        <button class="throttleBtn">SLOW</button>
        <button class="healBtn">HEAL</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <button id="spikeBtn">SPIKE STORM</button>
    <button id="healAllBtn">HEAL ALL</button>
    <button id="flushBtn">FLUSH LOGS</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
