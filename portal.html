<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Path — Desert Expeditions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@500;700&display=swap');

        :root {
            --sand-light: #f3e5ab;
            --sand-dark: #c2b280;
            --dust: #967117;
            --earth: #704214;
            --portal-blue: #00d2ff;
            --portal-orange: #f7971e;
            --bg: #ecd9ad;
            --text: #4a3728;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0,0,0,0.05) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 95%;
            max-width: 500px;
            padding: 30px;
            background: var(--sand-light);
            border: 8px solid var(--sand-dark);
            border-radius: 20px;
            box-shadow: 20px 20px 0px var(--earth);
            position: relative;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: var(--dust);
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: 700;
            color: var(--earth);
        }

        .grid {
            display: grid;
            gap: 4px;
            background: var(--sand-dark);
            padding: 4px;
            border-radius: 8px;
            margin: 0 auto 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .cell {
            aspect-ratio: 1;
            background: var(--sand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 4px;
            position: relative;
        }

        .cell.wall {
            background: var(--earth);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.1) 5px, rgba(0,0,0,0.1) 10px);
        }

        .cell.portal-a {
            background: var(--portal-blue);
            box-shadow: 0 0 15px var(--portal-blue);
            border-radius: 50%;
        }

        .cell.portal-b {
            background: var(--portal-orange);
            box-shadow: 0 0 15px var(--portal-orange);
            border-radius: 50%;
        }

        .player {
            z-index: 10;
            transition: transform 0.1s ease;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 180px;
            margin: 0 auto;
        }

        .ctrl-btn {
            background: var(--dust);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--earth);
            transition: 0.1s;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--earth);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(236, 217, 173, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 12px;
        }

        .btn-main {
            background: var(--dust);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--earth);
        }

        .btn-main:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--earth);
        }

        .hidden { display: none !important; }

        .instruction {
            font-size: 0.9rem;
            color: var(--earth);
            margin-top: 15px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="start-overlay" class="overlay">
            <h1>Portal Path</h1>
            <p style="margin-bottom: 30px;">Navigate the ruins. Blue and Orange portals link through space-time.</p>
            <button class="btn-main" onclick="initLevel()">Start Expedition</button>
        </div>
        <div id="status-overlay" class="overlay hidden">
            <h1 id="status-title">Victory!</h1>
            <p id="status-msg" style="margin-bottom: 30px;"></p>
            <button class="btn-main" id="status-btn" onclick="initLevel()">Next Site</button>
        </div>
        <div class="stats">
            <span>Level: <span id="level-num">1</span></span>
            <span>Moves: <span id="moves-val">0</span></span>
        </div>
        <div class="grid" id="grid"></div>
        <div class="controls">
            <div></div>
            <button class="ctrl-btn" onclick="move(0, -1)">▲</button>
            <div></div>
            <button class="ctrl-btn" onclick="move(-1, 0)">◀</button>
            <button class="ctrl-btn" onclick="move(0, 1)">▼</button>
            <button class="ctrl-btn" onclick="move(1, 0)">▶</button>
        </div>
        <div class="instruction">Use arrow keys or buttons to move.</div>
    </div>
    <script>
        const LEVELS = [
            { size: 5, start: [0,0], goal: [4,4], walls: [[1,1],[2,1],[3,1],[3,2]], portals: [] },
            { size: 6, start: [0,0], goal: [5,5], walls: [[1,1],[2,1],[4,4],[4,3]], portals: [{a: [2,2], b: [5,0]}] },
            { size: 7, start: [0,6], goal: [6,0], walls: [[1,1],[1,2],[1,3],[3,3],[3,4],[3,5]], portals: [{a: [0,0], b: [6,6]}] },
            { size: 8, start: [0,0], goal: [7,7], walls: [[2,0],[2,1],[2,2],[2,3],[5,5],[5,6],[5,7]], portals: [{a: [1,4], b: [6,2]}, {a: [0,7], b: [7,0]}] },
            { size: 6, start: [0,0], goal: [0,5], walls: [[1,0],[1,1],[1,2],[1,3],[1,4]], portals: [{a: [0,1], b: [5,5]}] }
        ];
        let state = { levelIdx: 0, moves: 0, player: [0,0], active: false, justTeleported: false };
        function initLevel() {
            const lvl = LEVELS[state.levelIdx];
            state.moves = 0; state.player = [...lvl.start]; state.active = true; state.justTeleported = false;
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('status-overlay').classList.add('hidden');
            document.getElementById('level-num').innerText = state.levelIdx + 1;
            updateStats(); renderGrid();
        }
        function renderGrid() {
            const lvl = LEVELS[state.levelIdx];
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${lvl.size}, 1fr)`;
            grid.innerHTML = '';
            for (let y = 0; y < lvl.size; y++) {
                for (let x = 0; x < lvl.size; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (x === state.player[0] && y === state.player[1]) {
                        cell.innerHTML = '<span class="player">🚶</span>';
                    } else if (x === lvl.goal[0] && y === lvl.goal[1]) {
                        cell.innerText = '🏁';
                        cell.style.background = '#ffd700';
                    } else if (lvl.walls.some(w => w[0] === x && w[1] === y)) {
                        cell.classList.add('wall');
                    } else {
                        const portal = lvl.portals.find(p => (p.a[0] === x && p.a[1] === y) || (p.b[0] === x && p.b[1] === y));
                        if (portal) {
                            if (portal.a[0] === x && portal.a[1] === y) cell.classList.add('portal-a');
                            else cell.classList.add('portal-b');
                        }
                    }
                    grid.appendChild(cell);
                }
            }
        }
        function move(dx, dy) {
            if (!state.active) return;
            const lvl = LEVELS[state.levelIdx];
            const nx = state.player[0] + dx;
            const ny = state.player[1] + dy;
            if (nx < 0 || nx >= lvl.size || ny < 0 || ny >= lvl.size) return;
            if (lvl.walls.some(w => w[0] === nx && w[1] === ny)) return;
            state.player = [nx, ny]; state.moves++;
            const portal = lvl.portals.find(p => (p.a[0] === nx && p.a[1] === ny) || (p.b[0] === nx && p.b[1] === ny));
            if (portal && !state.justTeleported) {
                if (portal.a[0] === nx && portal.a[1] === ny) state.player = [...portal.b];
                else state.player = [...portal.a];
                state.justTeleported = true;
            } else state.justTeleported = false;
            updateStats(); renderGrid(); checkWin();
        }
        function updateStats() { document.getElementById('moves-val').innerText = state.moves; }
        function checkWin() {
            const lvl = LEVELS[state.levelIdx];
            if (state.player[0] === lvl.goal[0] && state.player[1] === lvl.goal[1]) {
                state.active = false;
                state.levelIdx = (state.levelIdx + 1) % LEVELS.length;
                showStatus("Temple Cleared!", `Explored in ${state.moves} steps.`);
            }
        }
        function showStatus(title, msg) {
            const overlay = document.getElementById('status-overlay');
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
            overlay.classList.remove('hidden');
        }
        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': move(0, -1); break;
                case 'ArrowDown': move(0, 1); break;
                case 'ArrowLeft': move(-1, 0); break;
                case 'ArrowRight': move(1, 0); break;
            }
        });
    </script>
</body>
</html>
