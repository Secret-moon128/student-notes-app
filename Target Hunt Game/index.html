<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Target Hunt Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ─── Telemetry ─── -->
    <header class="dash">
      <div class="metric">
        <span class="m-label">Score</span>
        <span class="m-value" id="score">0</span>
      </div>
      <div class="metric">
        <span class="m-label">Accuracy</span>
        <span class="m-value accent" id="accuracy">—</span>
      </div>
      <div class="metric">
        <span class="m-label">Time</span>
        <span class="m-value" id="timer">30</span>
      </div>
      <div class="metric">
        <span class="m-label">Best</span>
        <span class="m-value" id="best">0</span>
      </div>
    </header>

    <!-- ─── Arena ─── -->
    <div class="arena" id="arena">
      <!-- targets injected here -->
      <!-- click trails injected here -->
    </div>

    <!-- ─── Controls ─── -->
    <div class="controls">
      <button class="btn-start primary" id="btn-start">▶ Start Hunt</button>
    </div>

    <!-- ─── Game Over ─── -->
    <div class="modal" id="modal">
      <div class="modal-card">
        <h2 class="modal-title">HUNT OVER</h2>
        <div class="modal-stats">
          <div class="m-row"><span>Targets Hit</span><span id="m-hits">0</span></div>
          <div class="m-row"><span>Shots Missed</span><span id="m-misses">0</span></div>
          <div class="m-row"><span>Accuracy</span><span id="m-acc">0%</span></div>
          <div class="m-row"><span>Score</span><span id="m-score">0</span></div>
          <div class="m-row"><span>Best</span><span id="m-best">0</span></div>
        </div>
        <button class="btn-restart" id="btn-restart">⟳ Hunt Again</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
