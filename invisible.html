<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Pattern — Predictive Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #22d3ee; /* Cyan */
            --accent-glow: rgba(34, 211, 238, 0.3);
            --secondary: #f472b6; /* Pink */
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
            --amber: #fbbf24;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pattern-display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 40px 20px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: white;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .hint-text {
            font-size: 0.95rem;
            color: var(--amber);
            margin-bottom: 20px;
            min-height: 24px;
            font-style: italic;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .opt-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        .opt-btn.correct { background: var(--success) !important; color: #022c22; border-color: var(--success); }
        .opt-btn.wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .explanation-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 15px;
            font-size: 0.9rem;
            color: #dcfce7;
            line-height: 1.5;
            margin-top: 10px;
            animation: fadeIn 0.4s ease;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-action {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 12px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--text); }
        .btn-action:disabled { opacity: 0.3; cursor: default; }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: var(--bg);
            border: none;
            padding: 16px 48px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px -5px var(--accent-glow);
        }

        .btn-main:hover { transform: scale(1.05); filter: brightness(1.1); }

        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div id="start-overlay" class="overlay">
                <h1>Invisible Pattern</h1>
                <p style="margin-bottom: 30px; color: var(--text-dim); font-size: 1.1rem;">Decipher the hidden logic and predict the next item in the sequence.</p>
                <button class="btn-main" onclick="startGame()">Initialize Search</button>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <h1 id="over-title">Mission Terminated</h1>
                <p id="final-stats" style="margin-bottom: 30px; color: var(--text-dim);"></p>
                <button class="btn-main" onclick="startGame()">Reboot Search</button>
            </div>

            <div class="stats-bar">
                <span>Level: <span id="level-val">1</span></span>
                <span>Score: <span id="score-val">0</span></span>
            </div>

            <div class="pattern-display" id="pattern-text">...</div>
            
            <div id="hint-display" class="hint-text"></div>

            <div class="options-grid" id="options-container"></div>

            <div id="explanation-container" class="explanation-box hidden"></div>

            <div class="btn-group" id="action-btns">
                <button class="btn-action" id="hint-btn" onclick="useHint()">Get Hint</button>
                <button class="btn-action hidden" id="next-btn" onclick="nextLevel()">Proceed</button>
            </div>
        </div>
    </div>

    <script>
        const PUZZLES = [
            { q: "2, 4, 8, 16, ?", o: ["24", "32", "30", "64"], a: "32", h: "Each number is double the previous one.", e: "Geometric progression with a common ratio of 2." },
            { q: "A, C, E, G, ?", o: ["H", "I", "J", "K"], a: "I", h: "Think about the skipping interval in the alphabet.", e: "Skip one letter between each step (A-B-C)." },
            { q: "1, 1, 2, 3, 5, ?", o: ["6", "7", "8", "9"], a: "8", h: "Add the two previous numbers together.", e: "This is the Fibonacci sequence: 3 + 5 = 8." },
            { q: "⚪, 🟦, ⚪, 🟦, ?", o: ["⚪", "🟦", "🔺", "⭐"], a: "⚪", h: "An alternating binary sequence.", e: "Simple ABAB pattern where white circle follows blue square." },
            { q: "1, 4, 9, 16, ?", o: ["20", "24", "25", "30"], a: "25", h: "These numbers are squares of integers.", e: "Perfect squares: 1², 2², 3², 4², so next is 5² (25)." },
            { q: "Z, X, V, T, ?", o: ["S", "R", "U", "Q"], a: "R", h: "Reverse alphabet jump.", e: "Alphabet in reverse, skipping one letter: T-S-R." },
            { q: "3, 6, 12, 21, ?", o: ["30", "33", "27", "36"], a: "33", h: "The amount added increases by 3 each time.", e: "The difference grows: +3, +6, +9, next is +12. 21 + 12 = 33." },
            { q: "🔺, 🟦, ⬟, ⬢, ?", o: ["⭐", "🛑", "⬣", "🟣"], a: "⬣", h: "Count the vertices (corners).", e: "Sides increasing: 3 (triangle), 4 (square), 5 (pentagon), 6 (hexagon)." },
            { q: "2, 3, 5, 7, 11, ?", o: ["12", "13", "14", "15"], a: "13", h: "Numbers divisible only by 1 and themselves.", e: "Sequence of Prime numbers." },
            { q: "J, F, M, A, M, ?", o: ["S", "O", "N", "J"], a: "J", h: "Look at a calendar.", e: "First letters of the months: Jan, Feb, Mar, Apr, May, June." }
        ];

        let state = {
            level: 0,
            score: 0,
            hintsUsed: 0,
            canAnswer: true
        };

        function startGame() {
            state.level = 0;
            state.score = 0;
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            loadLevel();
        }

        function loadLevel() {
            if (state.level >= PUZZLES.length) return endGame();

            const puzzle = PUZZLES[state.level];
            state.canAnswer = true;
            state.hintsUsed = 0;

            document.getElementById('level-val').innerText = state.level + 1;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('pattern-text').innerText = puzzle.q;
            document.getElementById('hint-display').innerText = "";
            document.getElementById('explanation-container').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');
            document.getElementById('hint-btn').disabled = false;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            puzzle.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function useHint() {
            const puzzle = PUZZLES[state.level];
            document.getElementById('hint-display').innerText = `Insight: ${puzzle.h}`;
            document.getElementById('hint-btn').disabled = true;
            state.hintsUsed = 1;
        }

        function checkAnswer(choice, btn) {
            if (!state.canAnswer) return;
            
            const puzzle = PUZZLES[state.level];
            const btns = document.querySelectorAll('.opt-btn');
            state.canAnswer = false;

            if (choice === puzzle.a) {
                btn.classList.add('correct');
                state.score += (state.hintsUsed ? 50 : 100);
                document.getElementById('score-val').innerText = state.score;
            } else {
                btn.classList.add('wrong');
                Array.from(btns).find(b => b.innerText === puzzle.a).classList.add('correct');
            }

            // Show explanation
            const exp = document.getElementById('explanation-container');
            exp.innerText = puzzle.e;
            exp.classList.remove('hidden');
            
            document.getElementById('hint-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextLevel() {
            state.level++;
            loadLevel();
        }

        function endGame() {
            const overlay = document.getElementById('game-over-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('over-title').innerText = "Search Complete";
            document.getElementById('final-stats').innerText = `Levels Cleared: ${state.level} | Total Score: ${state.score}`;
        }
    </script>
</body>
</html>
