<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown Notes App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>📝 Markdown Notes App</h1>
    <p class="subtitle">Write in Markdown → See live preview</p>

    <div class="editor-preview">
      <div class="card editor">
        <h2>Editor</h2>
        <textarea id="note-input" placeholder="Write your note in Markdown..."></textarea>
        <button id="save-btn">💾 Save Note</button>
      </div>

      <div class="card preview">
        <h2>Preview</h2>
        <div id="note-preview"></div>
      </div>
    </div>

    <div class="card saved-notes">
      <h2>📂 Saved Notes</h2>
      <ul id="notes-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
