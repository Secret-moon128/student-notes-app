<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Reaction — Golden Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;400;700;900&display=swap');

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9e272;
            --gold-dark: #996515;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #fffdf5;
            --error: #ff4d4d;
            --success: #00ff88;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1e1e1e 0%, #0a0a0a 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 500px;
            position: relative;
        }

        .gold-card {
            background: var(--surface);
            border: 2px solid var(--gold-primary);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px var(--gold-glow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .gold-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            pointer-events: none;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            margin: 0 0 10px;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gold-light);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .node-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
        }

        .node {
            aspect-ratio: 1;
            background: #222;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .node:hover:not(.active):not(.locked) {
            border-color: var(--gold-primary);
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .node.active {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 25px var(--gold-primary);
            z-index: 2;
        }

        .node.target {
            border: 3px dashed var(--gold-light);
            animation: pulse 2s infinite;
        }

        .node.pulse::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px solid var(--gold-light);
            border-radius: 12px;
            animation: ripple 0.6s ease-out forwards;
        }

        @keyframes ripple {
            to { transform: scale(1.5); opacity: 0; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0px var(--gold-glow); }
            50% { box-shadow: 0 0 20px var(--gold-primary); }
            100% { box-shadow: 0 0 0px var(--gold-glow); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 0 #7a5d10;
        }

        .btn-gold:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #7a5d10;
        }

        .instruction {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .hidden { display: none !important; }

        #feedback {
            height: 20px;
            font-weight: 800;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gold-card">
            <div id="start-overlay" class="overlay">
                <h1>Golden Protocol</h1>
                <p style="color: #aaa; margin-bottom: 30px;">Trigger the nodes in the correct sequence to activate the core. Watch for clues in the grid.</p>
                <button class="btn-gold" onclick="startGame()">Initiate Link</button>
            </div>

            <div id="result-overlay" class="overlay hidden">
                <h1 id="result-title">Protocol Cleared</h1>
                <p id="result-msg" style="margin-bottom: 30px;"></p>
                <button class="btn-gold" onclick="startGame()">Next Sector</button>
            </div>

            <div class="stats-bar">
                <span>Sector: <span id="level-val">1</span></span>
                <span>Energy: <span id="move-val">0</span></span>
            </div>

            <div class="instruction">Sequence required: Reach the Target Node</div>

            <div class="node-grid" id="grid"></div>

            <div id="feedback"></div>
        </div>
    </div>

    <script>
        const LEVELS = [
            { size: 16, sequence: [0, 1, 5, 9, 10], target: 10, hint: "Start at the top-left." },
            { size: 16, sequence: [3, 7, 11, 10, 6, 2], target: 2, hint: "Right column descent." },
            { size: 16, sequence: [12, 13, 14, 10, 6, 2, 1, 0], target: 0, hint: "Spiral into the origin." },
            { size: 16, sequence: [0, 4, 8, 12, 13, 9, 5, 1, 2, 6, 10, 14, 15], target: 15, hint: "The weaving path." },
            { size: 16, sequence: [15, 11, 7, 3, 2, 6, 10, 14, 13, 9, 5, 1, 0, 4, 8, 12], target: 12, hint: "Full circuit required." }
        ];

        let state = {
            level: 0,
            currentStep: 0,
            moves: 0,
            isLocked: false
        };

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('result-overlay').classList.add('hidden');
            loadLevel();
        }

        function loadLevel() {
            const lvl = LEVELS[state.level % LEVELS.length];
            state.currentStep = 0;
            state.moves = 0;
            state.isLocked = false;

            document.getElementById('level-val').innerText = state.level + 1;
            document.getElementById('move-val').innerText = state.moves;
            document.getElementById('feedback').innerText = "";

            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for (let i = 0; i < lvl.size; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                if (i === lvl.target) node.classList.add('target');
                node.dataset.id = i;
                node.onclick = () => handleNodeClick(i, node);
                
                // Visual indicators for the start node
                if (i === lvl.sequence[0]) {
                    node.innerText = "⚡";
                    node.style.borderColor = "var(--gold-light)";
                }

                grid.appendChild(node);
            }
        }

        function handleNodeClick(id, node) {
            if (state.isLocked || node.classList.contains('active')) return;

            const lvl = LEVELS[state.level % LEVELS.length];
            
            if (id === lvl.sequence[state.currentStep]) {
                // Correct Step
                node.classList.add('active');
                node.classList.add('pulse');
                state.currentStep++;
                state.moves++;
                document.getElementById('move-val').innerText = state.moves;
                
                if (id === lvl.target && state.currentStep === lvl.sequence.length) {
                    completeLevel();
                }
            } else {
                // Wrong Step - Chain Breaks
                triggerFailure();
            }
        }

        function triggerFailure() {
            state.isLocked = true;
            const feedback = document.getElementById('feedback');
            feedback.innerText = "LINK SEVERED — REBOOTING";
            feedback.style.color = "var(--error)";

            const nodes = document.querySelectorAll('.node');
            nodes.forEach(n => {
                if (n.classList.contains('active')) {
                    n.style.background = "var(--error)";
                }
            });

            setTimeout(() => {
                loadLevel();
            }, 1000);
        }

        function completeLevel() {
            state.isLocked = true;
            const feedback = document.getElementById('feedback');
            feedback.innerText = "PROTOCOL SYNCHRONIZED ✨";
            feedback.style.color = "var(--success)";

            setTimeout(() => {
                const overlay = document.getElementById('result-overlay');
                overlay.classList.remove('hidden');
                document.getElementById('result-msg').innerText = `Sector ${state.level + 1} synchronized in ${state.moves} interactions.`;
                state.level++;
            }, 1000);
        }
    </script>
</body>
</html>
