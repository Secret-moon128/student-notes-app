<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game | NSOC Contribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            box-shadow: 0 0 15px rgba(0,180,219,0.5);
        }

        .difficulty {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .difficulty.hidden {
            display: none;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #f7971e, #ffd200);
        }

        .scores {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 20px;
        }

        .score-card {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .score-card h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .score-card .score {
            color: #00ffcc;
            font-size: 36px;
            font-weight: bold;
        }

        .score-card.x .score {
            color: #ff6b6b;
        }

        .score-card.o .score {
            color: #4ecdc4;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .cell:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .turn-indicator {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            font-size: 18px;
        }

        .turn-indicator span {
            font-size: 24px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .winner-msg {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,255,0,0.2);
            border-radius: 10px;
            color: #00ff00;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: 0.3s;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .cell {
                font-size: 40px;
            }
            .score-card .score {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic-Tac-Toe</h1>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="2p">👥 2-Player</button>
            <button class="mode-btn" data-mode="ai">🤖 VS AI</button>
        </div>

        <div class="difficulty hidden" id="difficulty">
            <button class="difficulty-btn active" data-diff="easy">😊 Easy</button>
            <button class="difficulty-btn" data-diff="hard">🧠 Unbeatable</button>
        </div>

        <div class="scores">
            <div class="score-card x">
                <h3>❌ Player X</h3>
                <div class="score" id="scoreX">0</div>
            </div>
            <div class="score-card o">
                <h3>⭕ Player O</h3>
                <div class="score" id="scoreO">0</div>
            </div>
        </div>

        <div class="turn-indicator">
            Player's Turn: <span id="turnIndicator">❌ X</span>
        </div>

        <div id="winnerMsg" class="winner-msg" style="display: none;"></div>

        <div class="game-board" id="gameBoard">
            <!-- 9 cells will be added by JS -->
        </div>

        <button class="reset-btn" id="resetBtn">🔄 New Game</button>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scores = { X: 0, O: 0 };
        let gameMode = '2p'; // '2p' or 'ai'
        let difficulty = 'easy'; // 'easy' or 'hard'

        // DOM Elements
        const gameBoard = document.getElementById('gameBoard');
        const turnIndicator = document.getElementById('turnIndicator');
        const winnerMsgDiv = document.getElementById('winnerMsg');
        const resetBtn = document.getElementById('resetBtn');
        const scoreXSpan = document.getElementById('scoreX');
        const scoreOSpan = document.getElementById('scoreO');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const difficultyDiv = document.getElementById('difficulty');

        // Winning combinations
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8], // rows
            [0,3,6], [1,4,7], [2,5,8], // columns
            [0,4,8], [2,4,6] // diagonals
        ];

        // Initialize board
        function createBoard() {
            gameBoard.innerHTML = '';
            for(let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if(board[i] !== '' || !gameActive) {
                    cell.classList.add('disabled');
                }
                cell.textContent = board[i];
                cell.addEventListener('click', () => handleCellClick(i));
                gameBoard.appendChild(cell);
            }
        }

        // Handle cell click
        function handleCellClick(index) {
            if(!gameActive) return;
            if(board[index] !== '') return;

            makeMove(index, currentPlayer);

            if(gameActive && gameMode === 'ai' && currentPlayer === 'O') {
                setTimeout(() => aiMove(), 300);
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            updateBoard();

            if(checkWin(player)) {
                scores[player]++;
                updateScores();
                showWinner(`${player === 'X' ? '❌ X' : '⭕ O'} Wins! 🎉`);
                gameActive = false;
                return;
            }

            if(checkDraw()) {
                showWinner("It's a Draw! 🤝");
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateTurnIndicator();
        }

        // AI Move
        function aiMove() {
            if(!gameActive) return;

            let moveIndex;
            if(difficulty === 'easy') {
                moveIndex = getRandomMove();
            } else {
                moveIndex = getBestMove();
            }

            if(moveIndex !== -1 && board[moveIndex] === '') {
                makeMove(moveIndex, 'O');
            }
        }

        function getRandomMove() {
            const emptyIndices = board.reduce((arr, cell, idx) => {
                if(cell === '') arr.push(idx);
                return arr;
            }, []);
            if(emptyIndices.length === 0) return -1;
            return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        }

        function getBestMove() {
            // First check if AI can win
            for(let i = 0; i < 9; i++) {
                if(board[i] === '') {
                    board[i] = 'O';
                    if(checkWin('O')) {
                        board[i] = '';
                        return i;
                    }
                    board[i] = '';
                }
            }

            // Block player from winning
            for(let i = 0; i < 9; i++) {
                if(board[i] === '') {
                    board[i] = 'X';
                    if(checkWin('X')) {
                        board[i] = '';
                        return i;
                    }
                    board[i] = '';
                }
            }

            // Take center
            if(board[4] === '') return 4;

            // Take corners
            const corners = [0,2,6,8];
            const availableCorners = corners.filter(i => board[i] === '');
            if(availableCorners.length > 0) {
                return availableCorners[Math.floor(Math.random() * availableCorners.length)];
            }

            // Take any random move
            return getRandomMove();
        }

        function checkWin(player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => board[index] === player);
            });
        }

        function checkDraw() {
            return board.every(cell => cell !== '');
        }

        function showWinner(message) {
            winnerMsgDiv.textContent = message;
            winnerMsgDiv.style.display = 'block';
            winnerMsgDiv.style.animation = 'fadeIn 0.5s';
            turnIndicator.textContent = 'Game Over!';
            setTimeout(() => {
                winnerMsgDiv.style.display = 'none';
            }, 2000);
        }

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                cell.textContent = board[idx];
                if(board[idx] !== '' || !gameActive) {
                    cell.classList.add('disabled');
                } else {
                    cell.classList.remove('disabled');
                }
            });
        }

        function updateTurnIndicator() {
            if(gameActive) {
                turnIndicator.innerHTML = `${currentPlayer === 'X' ? '❌ X' : '⭕ O'}`;
            }
        }

        function updateScores() {
            scoreXSpan.textContent = scores.X;
            scoreOSpan.textContent = scores.O;
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            winnerMsgDiv.style.display = 'none';
            updateBoard();
            updateTurnIndicator();
            createBoard();

            // If AI mode and AI goes second, it will wait
        }

        function resetAll() {
            resetGame();
            if(gameMode === 'ai' && currentPlayer === 'O') {
                setTimeout(() => aiMove(), 500);
            }
        }

        // Mode switching
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameMode = btn.dataset.mode;
                
                if(gameMode === 'ai') {
                    difficultyDiv.classList.remove('hidden');
                } else {
                    difficultyDiv.classList.add('hidden');
                }
                
                // Reset everything
                scores = { X: 0, O: 0 };
                updateScores();
                resetGame();
            });
        });

        // Difficulty switching
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.diff;
                resetAll();
            });
        });

        resetBtn.addEventListener('click', () => {
            resetAll();
        });

        // Initialize
        createBoard();
    </script>
</body>
</html>
