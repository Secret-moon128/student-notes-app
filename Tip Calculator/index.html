<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Tip Calculator</h1>

      <div class="field">
        <label for="bill">Bill Amount (₦)</label>
        <input type="number" id="bill" placeholder="Enter bill amount" />
      </div>

      <div class="field">
        <label>Tip Percentage</label>
        <div class="pills">
          <button class="pill" data-tip="5">5%</button>
          <button class="pill" data-tip="10">10%</button>
          <button class="pill" data-tip="15">15%</button>
          <button class="pill" data-tip="20">20%</button>
        </div>
        <input type="number" id="custom-tip" placeholder="Or enter custom %" />
      </div>

      <div class="field">
        <label for="people">Split Between</label>
        <input type="number" id="people" placeholder="Number of people" min="1" />
      </div>

      <button id="calculate-btn">Calculate</button>

      <div class="results">
        <div class="result-card">
          <p>Tip Amount</p>
          <h2 id="tip-amount">₦0.00</h2>
        </div>
        <div class="result-card">
          <p>Total Bill</p>
          <h2 id="total-amount">₦0.00</h2>
        </div>
        <div class="result-card">
          <p>Per Person</p>
          <h2 id="per-person">₦0.00</h2>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
