<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#060812"/>
  <!-- Top bar -->
  <g transform="translate(6,5)">
    <rect x="0" y="0" width="116" height="14" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <text x="8" y="9" font-size="5" fill="#10b981" font-family="monospace" font-weight="700">Neo-Voxel</text>
    <text x="76" y="5.5" font-size="3.5" fill="#475569" font-family="monospace">Copy</text>
    <text x="92" y="5.5" font-size="3.5" fill="#475569" font-family="monospace">Clear</text>
    <text x="106" y="5.5" font-size="3.5" fill="#475569" font-family="monospace">Inv</text>
  </g>
  <!-- 8x8 Grid + Preview -->
  <g transform="translate(10,24)">
    <!-- Grid -->
    <rect x="0" y="0" width="52" height="52" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <!-- Letter 'A' on the grid -->
    <rect x="14" y="4" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="20" y="4" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="26" y="4" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="32" y="4" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="10" y="10" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="36" y="10" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="8" y="16" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="38" y="16" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="8" y="22" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="38" y="22" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="10" y="28" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="36" y="28" width="4" height="4" rx="1" fill="#10b981"/>
    <!-- Bottom rows of A -->
    <rect x="14" y="34" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="20" y="34" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="26" y="34" width="4" height="4" rx="1" fill="#10b981"/>
    <rect x="32" y="34" width="4" height="4" rx="1" fill="#10b981"/>

    <!-- Preview -->
    <rect x="62" y="0" width="34" height="52" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <text x="68" y="4.5" font-size="2.5" fill="#475569" font-family="monospace" letter-spacing="1">PREVIEW</text>
    <!-- Mini A in preview -->
    <rect x="68" y="10" width="2" height="2" fill="#10b981"/>
    <rect x="72" y="10" width="2" height="2" fill="#10b981"/>
    <rect x="76" y="10" width="2" height="2" fill="#10b981"/>
    <rect x="80" y="10" width="2" height="2" fill="#10b981"/>
    <rect x="66" y="14" width="2" height="2" fill="#10b981"/>
    <rect x="82" y="14" width="2" height="2" fill="#10b981"/>
    <rect x="66" y="18" width="2" height="2" fill="#10b981"/>
    <rect x="82" y="18" width="2" height="2" fill="#10b981"/>
    <rect x="66" y="22" width="2" height="2" fill="#10b981"/>
    <rect x="82" y="22" width="2" height="2" fill="#10b981"/>
    <rect x="68" y="26" width="2" height="2" fill="#10b981"/>
    <rect x="80" y="26" width="2" height="2" fill="#10b981"/>
    <rect x="68" y="30" width="2" height="2" fill="#10b981"/>
    <rect x="72" y="30" width="2" height="2" fill="#10b981"/>
    <rect x="76" y="30" width="2" height="2" fill="#10b981"/>
    <rect x="80" y="30" width="2" height="2" fill="#10b981"/>
  </g>
  <!-- Data panels -->
  <g transform="translate(10,80)">
    <!-- Hex panel -->
    <rect x="0" y="0" width="110" height="14" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <text x="4" y="3.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">HEX MATRIX</text>
    <text x="4" y="10" font-size="4" fill="#94a3b8" font-family="monospace">[0x00, 0x7E, 0x42, 0x42, 0x7E, 0x42, 0x42, 0x00]</text>
    <!-- Binary panel -->
    <rect x="0" y="16" width="110" height="14" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <text x="4" y="19.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">BINARY STREAM</text>
    <text x="4" y="26" font-size="3.5" fill="#94a3b8" font-family="monospace">00000000 01111110 01000010 ...</text>
  </g>
</svg>
