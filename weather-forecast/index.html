<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="weather-app" aria-label="Weather forecast">
      <header class="hero">
        <div>
          <p class="eyebrow">Live weather</p>
          <h1>Forecast for your current location</h1>
          <p class="subtitle">Uses browser geolocation and real-time weather data.</p>
        </div>
        <button class="location-button" id="refreshButton" type="button">Use current location</button>
      </header>

      <p class="status" id="status" role="status">Checking your location...</p>

      <section class="current-card" aria-live="polite">
        <div>
          <p class="location-label" id="locationName">--</p>
          <h2 class="temperature" id="temperature">--°</h2>
          <p class="condition" id="condition">Waiting for weather data</p>
        </div>
        <div class="weather-badge" id="weatherBadge">--</div>
      </section>

      <section class="details-grid" aria-label="Current weather details">
        <article class="detail-card">
          <span>Feels like</span>
          <strong id="feelsLike">--°</strong>
        </article>
        <article class="detail-card">
          <span>Humidity</span>
          <strong id="humidity">--%</strong>
        </article>
        <article class="detail-card">
          <span>Wind speed</span>
          <strong id="windSpeed">-- km/h</strong>
        </article>
        <article class="detail-card">
          <span>Coordinates</span>
          <strong id="coordinates">--</strong>
        </article>
      </section>

      <section class="forecast-section">
        <div class="section-heading">
          <h3>5-day forecast</h3>
          <p>Daily temperature and weather summary</p>
        </div>
        <div class="forecast-list" id="forecastList"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
