<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aim Trainer — E-Sports Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-cell">
        <span class="hud-label">Hits</span>
        <span id="hitsDisplay" class="hud-value">0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Accuracy</span>
        <span id="accDisplay" class="hud-value">—</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Avg RT</span>
        <span id="rtDisplay" class="hud-value">—</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Best</span>
        <span id="bestDisplay" class="hud-value">0</span>
      </div>
    </header>

    <div id="arena">
      <div id="startOverlay" class="overlay">
        <div class="overlay-box">
          <h1>AIM TRAINER</h1>
          <p class="sub">30-second session &bull; Click targets to destroy</p>
          <button id="startBtn" class="btn">START</button>
        </div>
      </div>

      <div id="endOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>SESSION COMPLETE</h2>
          <div class="report">
            <div class="r-row"><span>Targets Hit</span><span id="rHits">0</span></div>
            <div class="r-row"><span>Accuracy</span><span id="rAcc">0%</span></div>
            <div class="r-row"><span>Avg Reaction</span><span id="rRT">—</span></div>
            <div class="r-row"><span>Missed Targets</span><span id="rMissed">0</span></div>
          </div>
          <button id="restartBtn" class="btn">RESTART</button>
        </div>
      </div>
    </div>

    <div id="footerTimer">
      <span id="timerDisplay" class="timer-text">00</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
