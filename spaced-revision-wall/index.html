<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaced Revision Wall | Japan-Style Learning System | NSOC Contribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* Add Topic Section */
        .add-topic-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        #newTopicInput {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            outline: none;
        }

        #newTopicInput::placeholder {
            color: rgba(255,255,255,0.5);
        }

        #newTopicInput:focus {
            border: 1px solid #00ffcc;
        }

        .add-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,180,219,0.4);
        }

        .reset-all-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .reset-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220,53,69,0.4);
        }

        /* Stats Section */
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 12px 25px;
            text-align: center;
        }

        .stat-card span:first-child {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        .stat-card span:last-child {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* Topics Wall - Grid Layout */
        .topics-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Topic Card */
        .topic-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            border-left: 5px solid;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Urgency-based border colors */
        .topic-card.urgency-today {
            border-left-color: #dc3545;
            background: rgba(220,53,69,0.15);
        }

        .topic-card.urgency-tomorrow {
            border-left-color: #ffc107;
            background: rgba(255,193,7,0.1);
        }

        .topic-card.urgency-later {
            border-left-color: #28a745;
            background: rgba(40,167,69,0.08);
        }

        /* Card content */
        .topic-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .revision-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .revise-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .revise-btn.today {
            background: #dc3545;
        }

        .revise-btn.today:hover {
            background: #c82333;
            transform: scale(1.02);
        }

        .revise-btn.tomorrow {
            background: #ffc107;
            color: #333;
        }

        .revise-btn.tomorrow:hover {
            background: #e0a800;
            transform: scale(1.02);
        }

        .revise-btn.later {
            background: #28a745;
        }

        .revise-btn.later:hover {
            background: #218838;
            transform: scale(1.02);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .last-revised {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            color: #dc3545;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            color: rgba(255,255,255,0.5);
        }

        @media (max-width: 480px) {
            body {
                padding: 20px;
            }
            .topics-wall {
                grid-template-columns: 1fr;
            }
            .revision-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎌 Spaced Revision Wall</h1>
            <div class="subtitle">Japan-Style Spaced Repetition Learning System</div>
        </div>

        <div class="add-topic-section">
            <input type="text" id="newTopicInput" placeholder="Enter a new topic to study...">
            <button class="add-btn" id="addTopicBtn">➕ Add Topic</button>
            <button class="reset-all-btn" id="resetAllBtn">🗑️ Reset All</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span>📚 Total Topics</span>
                <span id="totalTopics">0</span>
            </div>
            <div class="stat-card">
                <span>🔴 Revise Today</span>
                <span id="todayCount">0</span>
            </div>
            <div class="stat-card">
                <span>🟡 Revise Tomorrow</span>
                <span id="tomorrowCount">0</span>
            </div>
            <div class="stat-card">
                <span>🟢 Revise Later</span>
                <span id="laterCount">0</span>
            </div>
        </div>

        <div class="topics-wall" id="topicsWall">
            <!-- Topics will appear here dynamically -->
        </div>
    </div>

    <script>
        // Topic data structure
        let topics = [];

        // Load from localStorage
        function loadTopics() {
            const saved = localStorage.getItem('spacedRevisionTopics');
            if(saved) {
                topics = JSON.parse(saved);
            } else {
                // Default topics
                topics = [
                    { id: Date.now() + 1, title: "Japanese Kanji Basics", urgency: "today", lastRevised: new Date().toLocaleDateString() },
                    { id: Date.now() + 2, title: "Physics: Newton's Laws", urgency: "tomorrow", lastRevised: new Date().toLocaleDateString() },
                    { id: Date.now() + 3, title: "Mathematics: Calculus", urgency: "later", lastRevised: new Date().toLocaleDateString() },
                    { id: Date.now() + 4, title: "English Vocabulary", urgency: "today", lastRevised: new Date().toLocaleDateString() }
                ];
            }
            renderTopics();
            updateStats();
        }

        // Save to localStorage
        function saveTopics() {
            localStorage.setItem('spacedRevisionTopics', JSON.stringify(topics));
        }

        // Update urgency class and last revised
        function updateUrgency(topicId, newUrgency) {
            const topic = topics.find(t => t.id === topicId);
            if(topic) {
                topic.urgency = newUrgency;
                topic.lastRevised = new Date().toLocaleDateString();
                saveTopics();
                renderTopics();
                updateStats();
            }
        }

        // Add new topic
        function addTopic() {
            const input = document.getElementById('newTopicInput');
            const title = input.value.trim();
            
            if(!title) {
                alert('Please enter a topic name!');
                return;
            }
            
            const newTopic = {
                id: Date.now(),
                title: title,
                urgency: "later",
                lastRevised: new Date().toLocaleDateString()
            };
            
            topics.push(newTopic);
            saveTopics();
            renderTopics();
            updateStats();
            
            input.value = '';
        }

        // Delete topic
        function deleteTopic(topicId) {
            if(confirm('Are you sure you want to delete this topic?')) {
                topics = topics.filter(t => t.id !== topicId);
                saveTopics();
                renderTopics();
                updateStats();
            }
        }

        // Reset all topics
        function resetAllTopics() {
            if(confirm('⚠️ This will delete ALL topics! Are you sure?')) {
                topics = [];
                saveTopics();
                renderTopics();
                updateStats();
            }
        }

        // Render topics wall
        function renderTopics() {
            const wall = document.getElementById('topicsWall');
            
            if(topics.length === 0) {
                wall.innerHTML = `
                    <div class="empty-state">
                        📭 No topics yet!<br>
                        Add your first topic to start your revision journey.
                    </div>
                `;
                return;
            }
            
            wall.innerHTML = topics.map(topic => `
                <div class="topic-card urgency-${topic.urgency}" data-id="${topic.id}">
                    <div class="topic-title">📖 ${escapeHtml(topic.title)}</div>
                    <div class="revision-buttons">
                        <button class="revise-btn today" onclick="updateUrgency(${topic.id}, 'today')">🔴 Revise Today</button>
                        <button class="revise-btn tomorrow" onclick="updateUrgency(${topic.id}, 'tomorrow')">🟡 Revise Tomorrow</button>
                        <button class="revise-btn later" onclick="updateUrgency(${topic.id}, 'later')">🟢 Revise Later</button>
                    </div>
                    <div class="card-footer">
                        <span class="last-revised">📅 Last revised: ${topic.lastRevised}</span>
                        <button class="delete-btn" onclick="deleteTopic(${topic.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update statistics
        function updateStats() {
            const total = topics.length;
            const today = topics.filter(t => t.urgency === 'today').length;
            const tomorrow = topics.filter(t => t.urgency === 'tomorrow').length;
            const later = topics.filter(t => t.urgency === 'later').length;
            
            document.getElementById('totalTopics').textContent = total;
            document.getElementById('todayCount').textContent = today;
            document.getElementById('tomorrowCount').textContent = tomorrow;
            document.getElementById('laterCount').textContent = later;
        }

        // Event listeners
        document.getElementById('addTopicBtn').addEventListener('click', addTopic);
        document.getElementById('resetAllBtn').addEventListener('click', resetAllTopics);
        document.getElementById('newTopicInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') addTopic();
        });

        // Initialize
        loadTopics();
    </script>
</body>
</html>
