<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide & Seek — Memory Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary: #06b6d4; /* Cyan */
            --secondary: #6366f1; /* Indigo */
            --accent: #f43f5e; /* Rose */
            --bg-gradient: linear-gradient(135deg, #ecfeff 0%, #e0e7ff 100%);
            --text: #0f172a;
            --text-muted: #475569;
            --glass: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.7);
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
        }

        .phase-text {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--secondary);
            height: 30px;
        }

        .object-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 30px;
            padding: 10px;
        }

        .obj-item {
            aspect-ratio: 1;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: auto;
        }

        .option-btn {
            background: white;
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--error); color: white; border-color: var(--error); }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 30px;
        }

        .btn-start {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
        }

        .btn-start:hover { transform: scale(1.05); background: #4f46e5; }

        .progress-timer {
            height: 6px;
            background: rgba(0,0,0,0.05);
            width: 100%;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 100%;
            transition: width linear;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div id="overlay" class="overlay">
            <h1 id="overlay-title">Hide & Seek 💎</h1>
            <p style="margin-bottom: 30px; color: var(--text-muted);">10 items appear. One will vanish. Can you remember?</p>
            <button class="btn-start" onclick="startGame()">Start Game</button>
        </div>

        <div class="stats">
            <div class="badge">Round: <span id="round">1</span>/10</div>
            <div class="badge" style="color: var(--secondary)">Score: <span id="score">0</span></div>
        </div>

        <div class="progress-timer"><div id="timer-bar" class="progress-fill"></div></div>
        <div id="phase-label" class="phase-text">Memorize!</div>

        <div class="object-grid" id="grid"></div>

        <div id="options" class="options-container hidden"></div>
    </div>
</div>

<script>
    const EMOJIS = ["🍎", "🐶", "🚀", "🎸", "🍕", "🍦", "🦁", "🚗", "🌈", "🏀", "🍔", "🐱", "🛸", "🎹", "🍣", "🍩", "🐘", "🚂", "🍀", "🏈", "🍒", "🐼", "🚁", "🎻", "🥨", "🧁", "🦋", "🚲", "🍄", "🏐"];
    
    let state = {
        round: 1,
        score: 0,
        currentSet: [],
        hiddenItem: null,
        phase: 'start'
    };

    function startGame() {
        state.round = 1;
        state.score = 0;
        document.getElementById('overlay').classList.add('hidden');
        nextRound();
    }

    function nextRound() {
        if (state.round > 10) return endGame("Legendary Memory! 🏆");
        
        document.getElementById('round').innerText = state.round;
        document.getElementById('score').innerText = state.score;
        document.getElementById('options').classList.add('hidden');
        document.getElementById('phase-label').innerText = "Memorize the 10 items!";
        
        // Pick 10 unique random emojis
        state.currentSet = [...EMOJIS].sort(() => Math.random() - 0.5).slice(0, 10);
        renderGrid(state.currentSet);

        const timer = document.getElementById('timer-bar');
        timer.style.transition = 'none';
        timer.style.width = '100%';
        
        setTimeout(() => {
            timer.style.transition = 'width 4s linear';
            timer.style.width = '0%';
        }, 50);

        setTimeout(hidePhase, 4000);
    }

    function renderGrid(items) {
        const grid = document.getElementById('grid');
        grid.innerHTML = items.map(item => `<div class="obj-item">${item}</div>`).join('');
    }

    function hidePhase() {
        state.hiddenItem = state.currentSet[Math.floor(Math.random() * 10)];
        const remaining = state.currentSet.filter(i => i !== state.hiddenItem);
        
        document.getElementById('phase-label').innerText = "What's missing?";
        renderGrid(remaining);

        // Generate 4 choices
        let choices = [state.hiddenItem];
        while(choices.length < 4) {
            let r = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
            if(!state.currentSet.includes(r) && !choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        const optContainer = document.getElementById('options');
        optContainer.innerHTML = choices.map(choice => 
            `<button class="option-btn" onclick="checkChoice('${choice}', this)">${choice}</button>`
        ).join('');
        optContainer.classList.remove('hidden');
    }

    function checkChoice(choice, btn) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if (choice === state.hiddenItem) {
            btn.classList.add('correct');
            state.score += 10;
            state.round++;
            setTimeout(nextRound, 1000);
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if(b.innerText === state.hiddenItem) b.classList.add('correct'); });
            setTimeout(() => endGame("Game Over! 🔮"), 1500);
        }
    }

    function endGame(title) {
        const overlay = document.getElementById('overlay');
        document.getElementById('overlay-title').innerText = title;
        overlay.querySelector('p').innerText = `Final Score: ${state.score} | Rounds: ${state.round - 1}`;
        overlay.classList.remove('hidden');
    }
</script>

</body>
</html>
