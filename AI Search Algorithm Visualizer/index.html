<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AI Search Algorithm Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div id="topBar">
    <select id="algoSel">
      <option value="bfs">BFS</option>
      <option value="dfs">DFS</option>
      <option value="astar" selected>A*</option>
      <option value="greedy">Greedy Best-First</option>
    </select>
    <div class="pg"><span class="pl">SPEED</span><input type="range" id="spdSlider" min="1" max="20" value="10" step="1"><span id="spdVal" class="pv">10</span></div>
    <div class="tm"><span class="tl">EXPANDED</span><span id="expVal" class="tv">0</span></div>
    <div class="tm"><span class="tl">VISITED</span><span id="visVal" class="tv">0</span></div>
    <div class="tm"><span class="tl">PATH LEN</span><span id="pathVal" class="tv">—</span></div>
    <div class="tm"><span class="tl">TIME</span><span id="timeVal" class="tv">—</span></div>
  </div>

  <div id="gridWrap"><div id="grid"></div></div>

  <div id="footer">
    <button id="searchBtn">FIND PATH</button>
    <button id="mazeBtn">GENERATE MAZE</button>
    <button id="clearBtn">CLEAR TRAIL</button>
    <button id="resetBtn">HARD RESET</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
